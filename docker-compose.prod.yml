version: '3.8'

services:
  claude-proxy:
    image: ${DOCKER_REGISTRY}/claude-proxy:${VERSION:-latest}
    container_name: claude-proxy-prod
    ports:
      - "54988:54988"
    volumes:
      - /data/claude-proxy:/app/data
      - /var/log/claude-proxy:/app/logs
    environment:
      - PORT=54988
      - HOST=0.0.0.0
      - LOG_LEVEL=INFO
      - DB_PATH=/app/data/proxy.db
      # Load Balancer Configuration
      - LB_HEALTH_CHECK_INTERVAL=30
      - LB_FAILURE_THRESHOLD=3
      - LB_RECOVERY_THRESHOLD=2
      - LB_MAX_RETRIES=3
      - LB_CIRCUIT_BREAKER_ENABLED=true
      - LB_ERROR_RATE_THRESHOLD=0.5
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:54988/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - claude-network
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 60s
        order: stop-first
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=claude-proxy"

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - claude-network
    restart: unless-stopped

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - claude-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  claude-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
