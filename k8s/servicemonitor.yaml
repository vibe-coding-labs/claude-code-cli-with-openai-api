apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: claude-code-cli-monitor
  namespace: zhaixingren-prod
  labels:
    app: claude-code-cli-openai-api
    release: prometheus
spec:
  selector:
    matchLabels:
      app: claude-code-cli-openai-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http
  namespaceSelector:
    matchNames:
    - zhaixingren-prod
